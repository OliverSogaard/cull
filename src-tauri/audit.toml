# cargo-audit config. Everything ignored here is a warn-level advisory
# (unmaintained/unsound), NOT a vulnerability — `cargo audit` is clean of
# actual CVEs as of 2026-07-07 (quick-xml RUSTSEC-2026-0194/0195 resolved by
# the same-day `cargo update`).
#
# The gtk-rs stack + glib entries are Linux-only transitive deps of tauri;
# CULL is Windows + macOS ONLY and Linux is compile-blocked (lib.rs), so that
# code can never run. proc-macro-error and the unic-* crates are build-time /
# platform-neutral transitive deps of tauri itself — nothing we can upgrade
# until tauri does. Revisit on tauri major bumps.
[advisories]
ignore = [
  "RUSTSEC-2024-0411", # atk unmaintained (Linux-only, compile-blocked)
  "RUSTSEC-2024-0412", # gdk-pixbuf unmaintained (Linux-only)
  "RUSTSEC-2024-0413", # atk-sys unmaintained (Linux-only)
  "RUSTSEC-2024-0414", # gdkwayland-sys unmaintained (Linux-only)
  "RUSTSEC-2024-0415", # gtk unmaintained (Linux-only)
  "RUSTSEC-2024-0416", # gdkx11 unmaintained (Linux-only)
  "RUSTSEC-2024-0417", # gtk3-macros unmaintained (Linux-only)
  "RUSTSEC-2024-0418", # gdk unmaintained (Linux-only)
  "RUSTSEC-2024-0419", # gdk-sys unmaintained (Linux-only)
  "RUSTSEC-2024-0420", # gtk-sys unmaintained (Linux-only)
  "RUSTSEC-2024-0429", # glib VariantStrIter unsoundness (Linux-only)
  "RUSTSEC-2024-0370", # proc-macro-error unmaintained (build-time, via tauri)
  "RUSTSEC-2025-0075", # unic-char-property/-range unmaintained (via tauri)
  "RUSTSEC-2025-0080", # unic-common unmaintained (via tauri)
  "RUSTSEC-2025-0081", # unic-char-* unmaintained (via tauri)
  "RUSTSEC-2025-0098", # unic-ucd-version unmaintained (via tauri)
  "RUSTSEC-2025-0100", # unic-ucd-ident unmaintained (via tauri)
]
